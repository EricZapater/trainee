server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serveix els fitxers estàtics i enruta la resta a l'index.html (History API de Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cau dels fitxers estàtics per millorar el rendiment
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Proxy per l'API (només si la DB/Backend estan al mateix Nginx, encara que ho gestionarem al docker-compose)
    # L'ideal és que Nginx enviï les peticions /api cap al backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

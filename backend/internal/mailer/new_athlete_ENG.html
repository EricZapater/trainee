<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Athlete Registered</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f5; }
  .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; }
  .header { background-color: #e3001b; padding: 40px 20px; text-align: center; color: white; font-size: 24px; font-weight: bold; }
  .content { padding: 40px 30px; color: #333333; line-height: 1.6; }
  .button-container { text-align: center; margin: 35px 0 15px 0; }
  .button { display: inline-block; background-color: #e3001b; color: #ffffff !important; text-decoration: none; font-weight: bold; padding: 14px 30px; border-radius: 6px; }
  .footer { background-color: #333333; color: #ffffff; padding: 20px; text-align: center; font-size: 13px; }
</style>
</head>
<body>
  <table width="100%" bgcolor="#f4f4f5" cellpadding="0" cellspacing="0" border="0" style="padding: 20px 0;">
    <tr><td align="center">
        <table class="container" width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr><td class="header">TrainEE</td></tr>
          <tr><td class="content">
              <h2>Hello {{.EntrenadorNom}},</h2>
              <p>The athlete <strong>{{.AtletaNom}}</strong> has registered on the platform and selected you as their coach.</p>
              <div class="button-container">
                <a href="{{.AppURL}}/atletes" class="button">Manage Athletes</a>
              </div>
            </td></tr>
          <tr><td class="footer">TrainEE - Training Management System</td></tr>
        </table>
    </td></tr>
  </table>
</body>
</html>

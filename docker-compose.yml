version: "3.8"

services:
  trainee-backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-ericzapater}/trainee-backend:latest
    container_name: trainee-backend
    restart: unless-stopped
    env_file:
      - .env.backend
    environment:
      - TZ=Europe/Madrid
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - postgres-network
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trainee-backend.rule=Host(`api.trainee.ericzapater.cat`)"
      - "traefik.http.routers.trainee-backend.entrypoints=websecure"
      - "traefik.http.routers.trainee-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.trainee-backend.loadbalancer.server.port=8080"
      - "traefik.docker.network=web"

  trainee-frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-ericzapater}/trainee-frontend:latest
    container_name: trainee-frontend
    restart: unless-stopped
    env_file:
      - .env.frontend
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trainee-frontend.rule=Host(`trainee.ericzapater.cat`)"
      - "traefik.http.routers.trainee-frontend.entrypoints=websecure"
      - "traefik.http.routers.trainee-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.trainee-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=web"

volumes:
  postgres_data:
  backend_uploads:

networks:
  web:
    external: true
  postgres-network:
    external: true
